name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Quality Gate — runs on every push / PR
  # ─────────────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm vue-tsc --noEmit

      - name: Unit tests
        run: pnpm vitest run

  # ─────────────────────────────────────────────
  # Release — only on push to main, after quality
  # ─────────────────────────────────────────────
  release:
    name: Release
    needs: quality
    runs-on: ubuntu-latest
    # Only release from main branch (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write       # push tags + commit back CHANGELOG/package.json
      issues: write         # comment on issues (optional)
      pull-requests: write  # comment on PRs (optional)
      id-token: write       # provenance for npm publish (future-proof)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required by semantic-release to analyse commits
          fetch-depth: 0
          # Use a PAT or deploy key so the release commit can trigger workflows
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm semantic-release
